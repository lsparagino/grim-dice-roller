<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grim Dice Roller — Dark Tactical RPG Companion</title>
    <meta name="description" content="A 3D dice roller companion app for Grim: Dark Tactical RPG. Roll d4, d6, d8, d10, d12, d20 with animated 3D dice and track your roll history." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Alegreya+SC:wght@400;700;800&family=Alegreya:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  </head>
  <body class="min-h-screen bg-grim-black text-grim-white overflow-x-hidden">

    <!-- Noise texture overlay -->
    <div id="noise-overlay" class="fixed inset-0 pointer-events-none z-50 opacity-[0.04]"></div>

    <div id="app" class="relative z-10 min-h-screen flex flex-col">

      <!-- Header -->
      <header class="py-3 px-4 text-center border-b border-grim-border/30">
        <h1 class="font-heading text-3xl sm:text-4xl md:text-5xl tracking-wider text-grim-white uppercase">
          Grim <span class="text-grim-highlight">Dice</span> Roller
        </h1>
        <p class="font-body text-xs sm:text-sm text-grim-muted mt-0.5 italic">Dark Tactical RPG Companion</p>
      </header>

      <!-- Main Content -->
      <main class="flex-1 flex flex-col max-w-5xl mx-auto w-full px-2 sm:px-4 py-3 sm:py-4 gap-3 sm:gap-4">

        <!-- 3D Dice Rolling Frame (always visible) -->
        <section id="dice-frame" class="relative w-full">
          <!-- 3D canvas -->
          <canvas id="dice-canvas" class="w-full rounded-lg border border-grim-border/20 bg-grim-surface"></canvas>

          <!-- Dice Selector Overlay -->
          <div id="dice-overlay" class="absolute inset-0 flex flex-col items-center justify-center rounded-lg transition-opacity duration-500">
            <h2 class="font-heading text-sm sm:text-lg uppercase tracking-widest text-grim-muted mb-1.5 sm:mb-3">Choose Your Dice</h2>
            <div id="dice-grid" class="grid grid-cols-3 gap-2 sm:gap-3 px-2 sm:px-6 w-full max-w-md"></div>
            <button
              id="roll-btn"
              disabled
              class="font-heading text-base sm:text-xl uppercase tracking-widest px-6 sm:px-10 py-2 sm:py-3 mt-2 sm:mt-4 bg-grim-border text-grim-white rounded
                     disabled:opacity-30 disabled:cursor-not-allowed disabled:shadow-none
                     hover:bg-grim-highlight/20 active:scale-95
                     shadow-[0_0_15px_rgba(200,200,200,0.1)] hover:shadow-[0_0_25px_rgba(200,200,200,0.15)]
                     transition-all duration-200 cursor-pointer"
            >
              Roll Dice
            </button>
          </div>

          <!-- Grand Total Overlay (shown after roll, animated) -->
          <div id="score-overlay" class="absolute inset-0 flex flex-col items-center justify-center opacity-0 transition-opacity duration-500"
               style="pointer-events: none;">
            <div id="per-type-totals" class="flex flex-wrap gap-2 justify-center mb-2"></div>
            <span id="grand-total" class="font-heading text-7xl sm:text-9xl text-grim-white score-pop">0</span>
            <span class="font-heading text-sm sm:text-base uppercase tracking-widest text-grim-muted mt-1">Grand Total</span>
            <button
              id="new-roll-btn"
              class="font-heading text-base sm:text-xl uppercase tracking-widest px-6 sm:px-10 py-2 sm:py-3 mt-4 sm:mt-6 bg-grim-border text-grim-white rounded
                     hover:bg-grim-highlight/20 active:scale-95
                     shadow-[0_0_15px_rgba(200,200,200,0.1)] hover:shadow-[0_0_25px_rgba(200,200,200,0.15)]
                     transition-all duration-200 cursor-pointer"
            >
              New Roll
            </button>
          </div>

          <!-- Totals-only results (>10 dice) -->
          <div id="totals-only" class="hidden absolute inset-0 rounded-lg overflow-auto p-4">
            <div id="totals-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
          </div>
        </section>

        <!-- Roll History -->
        <section id="history-section" class="mt-auto">
          <div class="flex items-center justify-between mb-2">
            <h2 class="font-heading text-base sm:text-lg uppercase tracking-widest text-grim-muted">Roll History</h2>
            <button id="clear-history-btn" class="font-body text-xs text-grim-muted hover:text-grim-white transition-colors cursor-pointer hidden">
              Clear
            </button>
          </div>
          <div id="history-list" class="space-y-2">
            <p id="history-empty" class="font-body text-xs sm:text-sm text-grim-muted/50 text-center italic py-3">No rolls yet. Choose your dice and roll!</p>
          </div>
        </section>

      </main>

      <!-- Footer -->
      <footer class="py-2 text-center border-t border-grim-border/30">
        <p class="font-body text-xs text-grim-muted/40">
          Companion app for <a href="https://www.grim-rpg.com" target="_blank" rel="noopener" class="text-grim-muted hover:text-grim-white transition-colors underline">Grim: Dark Tactical RPG</a>
        </p>
      </footer>

    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
